<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ศูนย์ช่วยเหลือ Technical Support - คู่มือการใช้งาน คำถามที่พบบ่อย และข้อมูลสำคัญสำหรับร้านค้า">
    <title>Knowledge Management Standard Operating Procedure (SOP)</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">

        <!-- ====== NAVBAR ====== -->
        <nav class="top-bar" id="navbar">
            <div style="display:flex; align-items:center; gap:8px;">
                <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="เปิดเมนู">
                    <i class="fas fa-bars"></i>
                </button>
                <a href="#" class="logo" onclick="event.preventDefault(); navigateTo('getting-started-payso');">
                    <img src="https://payso.co/_app/immutable/assets/Payso_logo.CRWy1N_-.png" alt="Payso Logo" style="height: 36px; object-fit: contain; filter: brightness(0) invert(1);">
                    <div class="brand-divider"></div>
                    <span class="brand-text" style="font-size: 13px; line-height: 1.2; font-weight: 600;">Knowledge Management<br>Standard Operating Procedure (SOP)</span>
                </a>
            </div>

            <!-- Search -->
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="ค้นหาข้อมูล หรือ สิ่งที่อยากรู้ได้ที่นี่..." autocomplete="off">
                </div>
                <div class="search-results" id="searchResults"></div>
            </div>

            <!-- Right section -->
            <div class="navbar-right">
                <span class="last-updated" id="lastUpdated"></span>
                <button class="topbar-link" id="faqBtn" onclick="showFAQ()" style="background: transparent; border: none; cursor: pointer;">
                    <i class="fas fa-circle-question"></i>
                    <span class="topbar-link-text">คำถามที่พบบ่อย</span>
                </button>
            </div>
        </nav>

        <!-- ====== CONTENT WRAPPER ====== -->
        <div class="page-wrapper">

            <!-- Sidebar Overlay (Mobile) -->
            <div class="sidebar-overlay" id="sidebarOverlay"></div>

            <!-- ====== SIDEBAR ====== -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-title">KNOWLEDGE BASE (SOP)</div>
                <nav id="sidebarNav">
                    <!-- Generated by JS -->
                </nav>
            </aside>

            <!-- ====== MAIN CONTENT ====== -->
            <main class="main-content" id="mainContent">
                <div id="loadingOverlay" style="text-align: center; padding: 40px; color: var(--color-primary);">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p style="margin-top: 10px;">กำลังโหลดข้อมูล...</p>
                </div>
                <div id="contentArea" class="fade-in" style="display: none;">
                    <!-- Article content rendered here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <!-- Scripts -->
    <script src="js/articles.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
